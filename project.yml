name: MonopolyAIRoyal
options:
  bundleIdPrefix: com.monopolyai
  deploymentTarget:
    macOS: "15.0"
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true
settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  MonopolyAIRoyal:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/chatterbox-setup.sh
        buildPhase: resources
      - path: Resources/MonopolyAIRoyal.help
        buildPhase: resources
    entitlements:
      path: MonopolyAIRoyal.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monopolyai.MonopolyAIRoyal
        INFOPLIST_FILE: Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GRDB
        product: GRDB
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
